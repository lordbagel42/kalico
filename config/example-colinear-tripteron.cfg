# This file is an example config file for colinear tripteron style
# printers. One may copy and edit this file to configure a new
# colinear tripteron printer.

# A colinear tripteron uses three vertical linear actuators (towers),
# each connected to the end-effector via a rigid arm at a fixed angle
# from vertical. The three towers are rotated around the Z axis
# (typically at 0, 120, and 240 degrees).

# See docs/Colinear_Tripteron.md for detailed setup and calibration
# instructions. See docs/Config_Reference.md for a description of
# parameters.

[printer]
kinematics: colinear_tripteron
max_velocity: 300
max_accel: 3000
# Arm angle from vertical in degrees. This must match the physical
# angle of the rigid arms. Typical range: 15-60 degrees.
# Smaller angle = finer XY resolution but less XY range.
# Larger angle = more XY range but less precision per step.
arm_angle: 30
# Tower rotation angles (azimuth around Z axis) in degrees.
# Default values give a standard symmetric arrangement.
# Only adjust if towers are not spaced exactly 120 degrees apart.
#alpha_tower_rotation: 0
#beta_tower_rotation: 120
#gamma_tower_rotation: 240

# Colinear tripteron printers use stepper_a, stepper_b, stepper_c
# (NOT stepper_x, stepper_y, stepper_z). Each tower homes to max Z.

[stepper_a]
# Alpha tower (default rotation: 0 degrees)
step_pin: PF0
dir_pin: PF1
enable_pin: !PD7
microsteps: 16
# rotation_distance: lead screw pitch x starts (e.g., T8x8 = 8mm)
rotation_distance: 40
endstop_pin: ^PE5
# position_endstop: distance from bed to nozzle when endstop triggers.
# Calibrate per-tower for a level bed.
position_endstop: 300
position_max: 300
homing_speed: 50

[stepper_b]
# Beta tower (default rotation: 120 degrees)
step_pin: PF6
dir_pin: PF7
enable_pin: !PF2
microsteps: 16
rotation_distance: 40
endstop_pin: ^PJ1
position_endstop: 300
position_max: 300
homing_speed: 50

[stepper_c]
# Gamma tower (default rotation: 240 degrees)
step_pin: PL3
dir_pin: PL1
enable_pin: !PK0
microsteps: 16
rotation_distance: 40
endstop_pin: ^PD3
position_endstop: 300
position_max: 300
homing_speed: 50

[extruder]
step_pin: PA4
dir_pin: PA6
enable_pin: !PA2
microsteps: 16
rotation_distance: 33.500
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PB4
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PK5
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 260

[heater_bed]
heater_pin: PH5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PK6
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130

[mcu]
serial: /dev/serial/by-id/usb-xxx

# Bed mesh is recommended for fine surface compensation after
# endstop calibration.
[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 25, 25
mesh_max: 275, 275
probe_count: 5, 5
